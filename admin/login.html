<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - LC Viagens</title>
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --blue: #1B6CA8;
            --blue-dark: #145a8e;
            --blue-light: #2a7fc0;
            --gold: #F5A623;
            --dark: #0d1b2a;
            --text: #1e293b;
            --muted: #64748b;
            --line: rgba(15, 23, 42, .10);
        }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse 80% 70% at 85% 15%, rgba(27,108,168,.16) 0%, transparent 58%),
                radial-gradient(ellipse 60% 60% at 15% 90%, rgba(245,166,35,.13) 0%, transparent 55%),
                linear-gradient(150deg, #ffffff 0%, #f4f8fc 45%, #edf3f9 100%);
        }
        .login-card {
            width: min(100%, 460px);
            background: rgba(255,255,255,.96);
            border: 1px solid rgba(255,255,255,.72);
            border-radius: 24px;
            box-shadow: 0 32px 90px rgba(13,27,42,.18);
            overflow: hidden;
        }
        .brand-panel {
            padding: 34px 34px 26px;
            color: #fff;
            background:
                linear-gradient(90deg, rgba(13,27,42,.94), rgba(13,27,42,.68)),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
        }
        .brand-row { display: flex; align-items: center; gap: 16px; }
        .logo-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,.32);
            background: var(--dark);
            flex: 0 0 auto;
            box-shadow: 0 12px 28px rgba(0,0,0,.25);
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .brand-name { font-size: 1.55rem; line-height: 1.05; font-weight: 800; color: #fff; }
        .brand-name span { color: var(--gold); }
        .brand-sub { margin-top: 6px; font-size: .9rem; color: rgba(255,255,255,.82); }
        .admin-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 26px;
            padding: 7px 14px;
            border-radius: 999px;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.18);
            font-size: .76rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
        }
        .form-panel { padding: 30px 34px 34px; }
        .hint {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 16px;
            margin-bottom: 22px;
            border-radius: 14px;
            color: #145a8e;
            background: rgba(27,108,168,.08);
            border: 1px solid rgba(27,108,168,.18);
            font-size: .88rem;
            line-height: 1.55;
        }
        .hint i { margin-top: 3px; color: var(--blue); }
        .error {
            display: none;
            align-items: center;
            gap: 9px;
            padding: 12px 14px;
            margin-bottom: 18px;
            border-radius: 12px;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            font-size: .88rem;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: .86rem;
            font-weight: 700;
        }
        .field-wrap { position: relative; }
        .field input {
            width: 100%;
            min-height: 54px;
            padding: 14px 46px 14px 16px;
            border: 2px solid #dbe3ee;
            border-radius: 14px;
            outline: none;
            color: var(--text);
            font-family: inherit;
            font-size: .96rem;
            transition: border-color .2s, box-shadow .2s;
            background: #fff;
        }
        .field input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 4px rgba(27,108,168,.10);
        }
        .field-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        .btn-login {
            width: 100%;
            min-height: 56px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            border: 0;
            border-radius: 999px;
            color: #fff;
            background: linear-gradient(135deg, var(--blue), var(--blue-light));
            box-shadow: 0 12px 28px rgba(27,108,168,.28);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform .2s, box-shadow .2s, background .2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, var(--blue-dark), var(--blue));
            box-shadow: 0 16px 36px rgba(27,108,168,.34);
        }
        .btn-login:disabled { opacity: .72; cursor: not-allowed; transform: none; }
        .back { margin-top: 22px; text-align: center; }
        .back a {
            color: var(--muted);
            font-size: .88rem;
            font-weight: 600;
            text-decoration: none;
            transition: color .2s;
        }
        .back a:hover { color: var(--blue); }
        @media (max-width: 520px) {
            body { padding: 16px; }
            .brand-panel, .form-panel { padding-left: 24px; padding-right: 24px; }
            .brand-row { align-items: flex-start; }
            .brand-name { font-size: 1.32rem; }
        }
    </style>
</head>
<body>
<main class="login-card">
    <section class="brand-panel" aria-label="LC Viagens">
        <div class="brand-row">
            <div class="logo-box">
                <img src="../imagens/logo_lc.jfif" alt="LC Viagens">
            </div>
            <div>
                <div class="brand-name">LC <span>Viagens</span></div>
                <div class="brand-sub">Clebert Rocha - Ag&ecirc;ncia de Viagens</div>
            </div>
        </div>
        <div class="admin-label"><i class="fa-solid fa-shield-halved"></i> Painel administrativo</div>
    </section>

    <section class="form-panel">
        <div class="hint">
            <i class="fa-solid fa-circle-info"></i>
            <span>Acesso restrito. Entre com as credenciais de administrador para ativar o modo de edi&ccedil;&atilde;o do site.</span>
        </div>

        <div class="error" id="error-msg">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span id="error-text">Email ou senha incorretos.</span>
        </div>

        <form id="login-form" autocomplete="on">
            <div class="field">
                <label for="email">Email de acesso</label>
                <div class="field-wrap">
                    <input type="email" id="email" placeholder="admin@lcviagens.com.br" required autocomplete="username">
                    <i class="fa-solid fa-envelope field-icon"></i>
                </div>
            </div>
            <div class="field">
                <label for="senha">Senha</label>
                <div class="field-wrap">
                    <input type="password" id="senha" placeholder="Senha do administrador" required autocomplete="current-password">
                    <i class="fa-solid fa-lock field-icon"></i>
                </div>
            </div>
            <button type="submit" class="btn-login" id="btn-login">
                <i class="fa-solid fa-lock-open"></i> Entrar no editor
            </button>
        </form>

        <div class="back">
            <a href="../index.html"><i class="fa-solid fa-arrow-left"></i> Voltar ao site</a>
        </div>
    </section>
</main>

<script>
    const AUTH_EMAIL = 'admin@lcviagens.com.br';
    const ADMIN_KEY = 'lc_auth';
    const SECRET_KEY = 'lc_secret';
    const LOCAL_SECRET = 'LCViagens@2026';

    const isLocal = location.protocol === 'file:'
                 || location.hostname === 'localhost'
                 || location.hostname === '127.0.0.1';

    try {
        const saved = JSON.parse(localStorage.getItem(ADMIN_KEY) || 'null');
        if (saved && saved.expires > Date.now()) {
            window.location.href = '../index.html?editor=1';
        }
    } catch (_) {
        localStorage.removeItem(ADMIN_KEY);
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const senha = document.getElementById('senha').value;
        const btn = document.getElementById('btn-login');
        const errEl = document.getElementById('error-msg');
        const errTxt = document.getElementById('error-text');

        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
        btn.disabled = true;
        errEl.style.display = 'none';

        if (email !== AUTH_EMAIL) {
            errTxt.textContent = 'Email nao reconhecido.';
            errEl.style.display = 'flex';
            btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no editor';
            btn.disabled = false;
            return;
        }

        if (isLocal) {
            await new Promise(resolve => setTimeout(resolve, 450));
            if (senha === LOCAL_SECRET) {
                localStorage.setItem(ADMIN_KEY, JSON.stringify({
                    email,
                    ts: Date.now(),
                    expires: Date.now() + 8 * 60 * 60 * 1000
                }));
                localStorage.setItem(SECRET_KEY, senha);
                window.location.href = '../index.html?editor=1';
            } else {
                errTxt.textContent = 'Senha incorreta. Tente novamente.';
                errEl.style.display = 'flex';
                btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no editor';
                btn.disabled = false;
            }
            return;
        }

        try {
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: senha })
            });
            const data = await res.json();

            if (data.ok) {
                localStorage.setItem(ADMIN_KEY, JSON.stringify({
                    email,
                    ts: Date.now(),
                    expires: Date.now() + 8 * 60 * 60 * 1000
                }));
                localStorage.setItem(SECRET_KEY, senha);
                window.location.href = '/index.html?editor=1';
            } else {
                errTxt.textContent = 'Senha incorreta. Tente novamente.';
                errEl.style.display = 'flex';
                btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no editor';
                btn.disabled = false;
            }
        } catch (err) {
            errTxt.textContent = 'Erro de conexao. Verifique sua internet e tente novamente.';
            errEl.style.display = 'flex';
            btn.innerHTML = '<i class="fa-solid fa-lock-open"></i> Entrar no editor';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
